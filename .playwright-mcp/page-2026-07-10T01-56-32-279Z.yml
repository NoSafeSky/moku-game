      - heading "Best Practices/Tips" [level=3] [ref=f1e103]
      - list [ref=f1e104]:
        - listitem [ref=f1e105]: We strongly advise you to show the option/button to continue the game’s natural flow (the one without a Rewarded Video behind it) on the primary and most natural position. Bringing too much attention to the Rewarded Video button or delaying the other options could hurt your players’ trust.
        - listitem [ref=f1e106]: Make sure rewarded options are not too invasive or insistent. If players feel too pushed to watch an ad or too many notifications are on their way, engagement could decrease.
        - listitem [ref=f1e107]: The industry standard to indicate a Rewarded Video is the icon 🎬.
        - listitem [ref=f1e108]: Make sure the player knows they have been rewarded after the ad. You can do this through an animation, with sound, or any kind of celebration.
        - listitem [ref=f1e109]: It’s usually a good idea to equip/activate the reward right after the player unlocks it (to minimize the amount of clicks and navigation), but this will depend on the type of reward.
        - listitem [ref=f1e110]: While letting players watch infinite Rewarded Videos is allowed, keep in mind how this could affect your game’s balance and progression, so you can set an according limit.
        - listitem [ref=f1e111]: Introducing dynamic Rewarded Video opportunities by showing Rewarded Video options only under specific circumstances (instead of static buttons), can give you more control on the amount of rewards a player is getting. For example, introducing it via an item/character that shows up only for some seconds, or modifying an earnings multiplier to make it more attractive to the player.
        - listitem [ref=f1e112]: Consider using your Rewarded Videos with temporary or themed content! Strategies like weekly or seasonal unlocks can help you increase engagement and retention.
