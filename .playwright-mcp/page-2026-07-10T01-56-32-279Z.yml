      - heading "💰 In-Game Economy" [level=3] [ref=f1e75]
      - paragraph [ref=f1e76]: Both Rewarded Videos and in-game economy systems (coins, points, keys, tokens…) often coexist within the same game. In a lot of cases the content available through rewarded videos can also be available through the game’s internal economy.
      - paragraph [ref=f1e77]: Letting users decide if they want to get a reward using the coins they have collected by playing, or if they prefer to watch a video, is a good strategy to keep a balance between different game mechanics.
      - generic [ref=f1e78]:
