      - heading "Monetization" [level=1] [ref=f1e19]
      - paragraph [ref=f1e20]: The earlier you think about monetization for you game, the better. Leaving it until the last moment makes it feel forced and often not worthwhile for players compared to implementing it early. Doing this means you can make ads feel really beneficial by offering very relevant rewards at the relevant time. This will help boost the monetization and revenue for you game without impacting UX as negatively!
      - heading "What are Rewarded Videos?" [level=3] [ref=f1e21]
      - paragraph [ref=f1e22]:
        - text: Rewarded Videos allow players to choose to
        - strong [ref=f1e23]: watch a video ad in exchange for a certain benefit in a game
        - text: . They are meant to enhance the player experience, and should never block content of the core gameplay.
      - paragraph [ref=f1e24]: In this page you can find the basics of Rewarded Videos as well as some ways you might be able to integrate them into your game 💪
      - paragraph [ref=f1e25]: "Disclaimer: Prioritize fun! If players aren’t engaged with your game, the different Rewarded Video options won’t make a big difference. We know that games with a higher engagement also get more clicks on Rewarded Videos 📈."
      - generic [ref=f1e26]:
        - heading "Requirements" [level=3] [ref=f1e27]
        - list [ref=f1e28]:
          - listitem [ref=f1e29]:
            - text: Rewarded Videos
            - strong [ref=f1e30]: should never block content of the core gameplay
            - text: ", but rather serve as an extra optional perk."
          - listitem [ref=f1e31]:
            - text: Any button that triggers a Rewarded Video should be
            - strong [ref=f1e32]: clearly distinguishable
            - text: (with text and/or an icon), accessible, and not misleading in any way.
      - heading "Types of Rewarded Videos" [level=3] [ref=f1e33]
      - paragraph [ref=f1e34]: In order to better understand how games could benefit from Rewarded Videos, we have divided them into several categories.
      - paragraph [ref=f1e35]: Keep in mind that the examples below are some of the most used options, which doesn’t mean you should stop experimenting or come up with brand new cool ideas! 💪
      - heading "🤝 A Helping Hand" [level=3] [ref=f1e36]
      - paragraph [ref=f1e37]: Rewarded Videos can be helpful when trying to balance difficulty in a game (which plays a big part in engagement), since it provides players with alternative ways to reach their goals.
      - paragraph [ref=f1e38]: While all games should be accessible and easy to understand, offering a helping hand to those players who are struggling will help reduce the number of drop-offs.
