          - heading "Multiply reward" [level=3] [ref=f1e80]
          - paragraph [ref=f1e81]: Watch a Rewarded Video to multiply (for example x2) the coins/points that you’ve gotten (either during gameplay or as offline earnings).
          - paragraph [ref=f1e82]:
