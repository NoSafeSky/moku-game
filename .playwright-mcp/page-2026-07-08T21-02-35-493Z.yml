        - article [ref=f3e143]:
          - heading "How Does Poki Promote My Game? ⭐️" [level=1] [ref=f3e144]
          - heading "Promotion at Global Release" [level=2] [ref=f3e145]:
            - link "Promotion at Global Release" [ref=f3e146] [cursor=pointer]:
              - /url: "#promotion-at-global-release"
          - paragraph [ref=f3e147]: Poki promotes every newly released game for 2-3 weeks to help it find its audience. During this period, the game receives prominent placement on category pages, promotion on related game pages to encourage relevant connections, and visibility on the Poki homepage (by adding a “fire” icon to make it stand out). Games that perform particularly well compared to other recent global releases have an even greater chance of securing extended visibility on the homepage.
          - separator [ref=f3e148]
          - heading "Post-Release Promotion" [level=2] [ref=f3e149]:
            - link "Post-Release Promotion" [ref=f3e150] [cursor=pointer]:
              - /url: "#post-release-promotion"
          - paragraph [ref=f3e151]: "After launch, games continue to be recommended within relevant category pages and game pages. Poki continues to promote games based on game performance metrics with:"
          - list [ref=f3e152]:
            - listitem [ref=f3e153]: Higher placement on category pages and game pages;
            - listitem [ref=f3e154]: Placement on the Poki homepage as a large or small tile (for top-performing games in each category);
          - paragraph [ref=f3e155]: Games that perform well with players, receive additional promotion and visibility. The metrics you can see on your Poki for Developers dashboard (total gameplays, engagement time, and conversion to play) are the key metrics we consider.
          - paragraph [ref=f3e156]: As game performance improves, the recommender notices and adapts promotions accordingly. The system continuously updates based on daily releases, ensuring it promotes games that serve the best interests of both users and developers. If your game’s performance stats significantly change, the system will take this into account in the week after the improvement.
          - paragraph [ref=f3e157]: There’s no exact metric that guarantees homepage placement, but updating game content regularly and higher performance stats will be noticed by our recommender, and receive more promotions!
          - separator [ref=f3e158]
          - paragraph [ref=f3e159]
