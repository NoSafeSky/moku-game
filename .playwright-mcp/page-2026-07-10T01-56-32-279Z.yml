        - heading "Cosmetics" [level=3] [ref=f1e99]
        - paragraph [ref=f1e100]: Watch a Rewarded Video to get one or more cosmetic aspects for your character/weapon. This can be done through a direct unlock (1 video = 1 reward), or in a progressive way (several videos = 1 reward).
        - paragraph [ref=f1e101]:
