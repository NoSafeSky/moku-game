      - heading "🎀 Customization" [level=3] [ref=f1e90]
      - paragraph [ref=f1e91]: Giving players the opportunity to customize aspects of the game helps them create a bigger sense of ownership, investment, and connection to it. Unlocking a collection of items also serves as a new goal for players, and makes the game more re-playable.
      - generic [ref=f1e92]:
